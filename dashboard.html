<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SmartList – My Inventory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <div class="dashboard-card">
        <header class="dashboard-header">
          <div class="dashboard-header-row">
            <button type="button" class="icon-btn" aria-label="Menu">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" fill="currentColor"/>
              </svg>
            </button>
            <div class="dashboard-header-actions">
              <button type="button" class="icon-btn" aria-label="Search">
                <img src="./24x24_search.svg" alt="" width="24" height="24" />
              </button>
              <button type="button" class="icon-btn icon-btn-profile" aria-label="Profile">
                <img src="./24x24_profile.svg" alt="" width="24" height="24" />
              </button>
            </div>
          </div>
          <div class="dashboard-header-titles">
            <h1 class="dashboard-title">My Inventory</h1>
            <p class="dashboard-subtitle">5 items</p>
          </div>
        </header>

        <div class="inventory-list">
          <article class="inventory-item">
            <img src="https://picsum.photos/80/80?random=1" alt="" class="inventory-item-img" />
            <div class="inventory-item-body">
              <h2 class="inventory-item-title">Stylish Duck-Handle Compact Umbrella</h2>
              <p class="inventory-item-price">€34.99</p>
              <span class="inventory-tag inventory-tag--listed">Listed</span>
            </div>
            <button type="button" class="icon-btn" aria-label="More options">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="currentColor"/>
              </svg>
            </button>
          </article>

          <article class="inventory-item">
            <img src="https://picsum.photos/80/80?random=2" alt="" class="inventory-item-img" />
            <div class="inventory-item-body">
              <h2 class="inventory-item-title">Nike Air Max 90s Sneakers</h2>
              <p class="inventory-item-price">€89.99</p>
              <span class="inventory-tag inventory-tag--sold">Sold</span>
            </div>
            <button type="button" class="icon-btn" aria-label="More options">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="currentColor"/>
              </svg>
            </button>
          </article>

          <article class="inventory-item">
            <img src="https://picsum.photos/80/80?random=3" alt="" class="inventory-item-img" />
            <div class="inventory-item-body">
              <h2 class="inventory-item-title">Wireless Headphones</h2>
              <p class="inventory-item-price">€119.99</p>
              <span class="inventory-tag inventory-tag--listed">Listed</span>
            </div>
            <button type="button" class="icon-btn" aria-label="More options">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="currentColor"/>
              </svg>
            </button>
          </article>

          <article class="inventory-item">
            <img src="https://picsum.photos/80/80?random=4" alt="" class="inventory-item-img" />
            <div class="inventory-item-body">
              <h2 class="inventory-item-title">Leather Crossbody Bag</h2>
              <p class="inventory-item-price">€64.99</p>
              <span class="inventory-tag inventory-tag--listed">Listed</span>
            </div>
            <button type="button" class="icon-btn" aria-label="More options">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="currentColor"/>
              </svg>
            </button>
          </article>

          <article class="inventory-item">
            <img src="https://picsum.photos/80/80?random=5" alt="" class="inventory-item-img" />
            <div class="inventory-item-body">
              <h2 class="inventory-item-title">Rare 1970s Vintage Original Soviet Watch</h2>
              <p class="inventory-item-price">€249.99</p>
              <span class="inventory-tag inventory-tag--listed">Listed</span>
            </div>
            <button type="button" class="icon-btn" aria-label="More options">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="currentColor"/>
              </svg>
            </button>
          </article>
        </div>

        <a href="#" class="fab fab-camera" aria-label="Take photo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 15.2c1.99 0 3.6-1.61 3.6-3.6s-1.61-3.6-3.6-3.6-3.6 1.61-3.6 3.6 1.61 3.6 3.6 3.6z" fill="currentColor"/>
            <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z" fill="currentColor"/>
          </svg>
        </a>
      </div>
    </main>
  </body>
</html>
