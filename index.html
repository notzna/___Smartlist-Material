<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SmartList – Sign in</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card" aria-label="SmartList sign in">
        <header class="card-header">
          <div class="logo-circle">
            <img src="./logo.svg" alt="" class="logo-icon" />
          </div>
          <div class="card-heading">
            <h1 class="headline">SmartList</h1>
            <p class="subhead">AI-Powered Reselling Made Easy</p>
          </div>
        </header>

        <div class="provider-buttons">
          <button class="btn btn-outline btn-google" type="button">
            <span class="btn-icon">
              <img
                src="./24x24_google.svg"
                alt=""
              />
            </span>
            <span class="btn-label">Continue with Google</span>
          </button>

          <button class="btn btn-outline btn-apple" type="button">
            <span class="btn-icon">
              <img
                src="./24x24_apple.svg"
                alt=""
              />
            </span>
            <span class="btn-label">Continue with Apple</span>
          </button>
        </div>

        <p class="divider-text">or</p>

        <form class="auth-form">
          <div class="field">
            <input
              class="field-input"
              type="email"
              name="email"
              placeholder="Email"
              autocomplete="email"
            />
          </div>

          <div class="field">
            <input
              class="field-input"
              type="password"
              name="password"
              placeholder="Password"
              autocomplete="current-password"
            />
          </div>

          <a href="./dashboard.html" class="btn btn-filled">
            <span class="btn-label">Sign in</span>
          </a>
        </form>

        <p class="footer-text">
          Don’t have an account?
          <a href="#" class="footer-link">Sign Up</a>
        </p>
      </section>
    </main>
  </body>
  </html>
